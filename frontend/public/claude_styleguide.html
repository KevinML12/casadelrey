document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"es\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Casa del Rey · Style Guide<\u002Ftitle>\n\n<style>\n/* ============================================================\n   DESIGN TOKENS — derived from \"Composing Custom Layouts with SwiftUI\"\n   ============================================================ */\n:root {\n  /* — Color: the actor — */\n  --blue:        #007AFF;   /* systemBlue */\n  --blue-strong: #0A66E0;\n  --blue-press:  #0052C7;\n  --blue-tint:   #E6F0FF;   /* bordered-button fill */\n\n  /* — Color: the track / secondary — */\n  --cyan:        #BFE9F0;   /* progress track + secondary fills */\n  --cyan-soft:   #DCF3F7;\n  --cyan-ink:    #1FA2C4;\n\n  /* — Color: layout guides (the blueprint motif) — */\n  --guide:       #E6007E;   /* magenta dashed guides */\n  --guide-soft:  #F7B9D7;\n  --guide-bg:    #FDEBF1;   /* pale pink guide card */\n\n  /* — Neutrals (HIG light) — */\n  --label:        #1C1C1E;\n  --label-2:      #3C3C4399;  /* secondaryLabel 60% */\n  --label-3:      #3C3C434D;\n  --separator:    #E5E5EA;\n  --fill:         #78788014;\n  --bg:           #FFFFFF;\n  --bg-grouped:   #F2F2F7;\n  --bg-elevated:  #FFFFFF;\n\n  /* — Avatar accents (sample pets) — */\n  --c-cat:    #FF9F0A;\n  --c-fish:   #FFD60A;\n  --c-dog:    #AC8E68;\n\n  /* — Type scale (SF / HIG) — */\n  --f-large: 34px;  --f-t1: 28px;  --f-t2: 22px;  --f-t3: 20px;\n  --f-head: 17px;   --f-body: 17px; --f-call: 16px; --f-sub: 15px;\n  --f-foot: 13px;   --f-cap: 12px;\n\n  /* — Radius (continuous/squircle feel) — */\n  --r-sm: 8px;  --r-md: 12px;  --r-lg: 16px;  --r-xl: 22px;  --r-pill: 980px;\n\n  /* — Spacing (8-pt grid) — */\n  --s1: 4px; --s2: 8px; --s3: 12px; --s4: 16px; --s5: 24px; --s6: 32px; --s7: 48px; --s8: 64px;\n\n  /* — Elevation — */\n  --sh-1: 0 1px 2px rgba(0,0,0,.04), 0 1px 3px rgba(0,0,0,.06);\n  --sh-2: 0 4px 16px rgba(0,0,0,.06), 0 1px 4px rgba(0,0,0,.04);\n  --sh-3: 0 12px 36px rgba(0,0,0,.10), 0 2px 8px rgba(0,0,0,.05);\n  --sh-avatar: 0 3px 10px rgba(0,0,0,.18);\n\n  /* — Motion: one rule, the SwiftUI default spring — */\n  --spring: 520ms cubic-bezier(.32,1.28,.42,1);\n  --ease:   280ms cubic-bezier(.4,0,.2,1);\n\n  --maxw: 1080px;\n}\n\n*, *::before, *::after { box-sizing: border-box; }\nhtml { -webkit-text-size-adjust: 100%; }\nbody {\n  margin: 0;\n  font-family: -apple-system, BlinkMacSystemFont, \"SF Pro Text\", \"SF Pro Display\", \"Helvetica Neue\", Helvetica, Arial, sans-serif;\n  color: var(--label);\n  background: var(--bg-grouped);\n  font-size: var(--f-body);\n  line-height: 1.5;\n  -webkit-font-smoothing: antialiased;\n  letter-spacing: -0.01em;\n}\nh1,h2,h3,h4 { margin: 0; letter-spacing: -0.022em; font-weight: 700; }\np { margin: 0; }\na { color: var(--blue); text-decoration: none; }\nbutton { font-family: inherit; cursor: pointer; }\n::selection { background: rgba(0,122,255,.18); }\n\n/* ---------- Layout shell ---------- */\n.wrap { max-width: var(--maxw); margin: 0 auto; padding: 0 24px; }\n\n/* top nav */\n.topbar {\n  position: sticky; top: 0; z-index: 50;\n  background: rgba(255,255,255,.72);\n  backdrop-filter: saturate(180%) blur(20px);\n  -webkit-backdrop-filter: saturate(180%) blur(20px);\n  border-bottom: 0.5px solid var(--separator);\n}\n.topbar .row { display: flex; align-items: center; justify-content: space-between; height: 52px; }\n.brand { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 15px; letter-spacing: -.02em; }\n.brand .mark { width: 26px; height: 26px; border-radius: 7px; background: var(--blue); display: grid; place-items: center; color: #fff; box-shadow: var(--sh-1); }\n.brand .mark svg { width: 16px; height: 16px; }\n.topnav { display: flex; gap: 4px; }\n.topnav a { font-size: 13px; font-weight: 590; color: var(--label-2); padding: 6px 11px; border-radius: var(--r-pill); transition: background var(--ease), color var(--ease); }\n.topnav a:hover { background: var(--fill); color: var(--label); }\n@media (max-width: 720px){ .topnav{ display:none; } }\n\n/* hero */\n.hero { padding: 76px 0 56px; text-align: center; }\n.kicker { display:inline-flex; align-items:center; gap:7px; font-size:12px; font-weight:680; letter-spacing:.02em; color: var(--blue); background: var(--blue-tint); padding: 6px 13px; border-radius: var(--r-pill); }\n.hero h1 { font-size: clamp(34px, 6vw, 56px); line-height: 1.04; font-weight: 760; margin-top: 18px; letter-spacing: -.03em; }\n.hero h1 .accent { color: var(--blue); }\n.hero p { max-width: 620px; margin: 18px auto 0; font-size: var(--f-t3); color: var(--label-2); line-height: 1.45; }\n.hero .meta { margin-top: 22px; display:flex; gap:8px; justify-content:center; flex-wrap:wrap; }\n.tag { font-size: 12px; font-weight: 620; color: var(--label-2); background: var(--bg); border: 0.5px solid var(--separator); padding: 6px 12px; border-radius: var(--r-pill); box-shadow: var(--sh-1); }\n\n/* section */\nsection.block { padding: 40px 0; }\n.sec-head { display:flex; align-items:baseline; gap:14px; margin-bottom: 24px; }\n.sec-num { font-size: 13px; font-weight: 700; color: var(--guide); font-variant-numeric: tabular-nums; letter-spacing: .04em; }\n.sec-head h2 { font-size: var(--f-t1); letter-spacing: -.028em; }\n.sec-head .sub { font-size: var(--f-sub); color: var(--label-2); margin-left: auto; max-width: 360px; text-align: right; }\n@media (max-width:720px){ .sec-head .sub{ display:none; } }\n\n/* card */\n.card { background: var(--bg-elevated); border-radius: var(--r-lg); border: 0.5px solid var(--separator); box-shadow: var(--sh-2); }\n.grid { display: grid; gap: 16px; }\n.cols-2 { grid-template-columns: repeat(2, 1fr); }\n.cols-3 { grid-template-columns: repeat(3, 1fr); }\n.cols-4 { grid-template-columns: repeat(4, 1fr); }\n@media (max-width: 820px){ .cols-3,.cols-4{ grid-template-columns: repeat(2,1fr);} }\n@media (max-width: 560px){ .cols-2,.cols-3,.cols-4{ grid-template-columns: 1fr; } }\n\n.label-row { display:flex; align-items:center; justify-content:space-between; padding: 14px 16px; border-top: 0.5px solid var(--separator); font-size: var(--f-foot); }\n.label-row .k { color: var(--label-2); }\n.label-row .v { font-weight: 640; font-variant-numeric: tabular-nums; }\n\n/* — Color swatch — */\n.swatch { border-radius: var(--r-md); overflow: hidden; border: 0.5px solid var(--separator); background: var(--bg); box-shadow: var(--sh-1); }\n.swatch .chip { height: 78px; }\n.swatch .meta { padding: 10px 12px; }\n.swatch .name { font-size: 13px; font-weight: 640; }\n.swatch .hex { font-size: 12px; color: var(--label-2); font-variant-numeric: tabular-nums; text-transform: uppercase; }\n\n/* — Type specimens — */\n.type-row { display:flex; align-items:baseline; gap:20px; padding: 16px; border-top: 0.5px solid var(--separator); }\n.type-row:first-child { border-top: none; }\n.type-row .spec { color: var(--label-2); font-size: 12px; width: 140px; flex: none; font-variant-numeric: tabular-nums; }\n.type-row .sample { color: var(--label); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }\n\n/* — Buttons (bordered SwiftUI style) — */\n.btn { display:inline-flex; align-items:center; justify-content:center; gap:7px; font-weight: 600; font-size: var(--f-call); border: none; border-radius: var(--r-md); padding: 10px 18px; transition: transform var(--ease), background var(--ease), box-shadow var(--ease); }\n.btn:active { transform: scale(.96); }\n.btn-bordered { background: var(--blue-tint); color: var(--blue); }\n.btn-bordered:hover { background: #d6e6ff; }\n.btn-filled { background: var(--blue); color: #fff; box-shadow: 0 4px 14px rgba(0,122,255,.32); }\n.btn-filled:hover { background: var(--blue-strong); }\n.btn-filled:active { background: var(--blue-press); }\n.btn-plain { background: transparent; color: var(--blue); padding: 10px 12px; }\n.btn-plain:hover { background: var(--fill); }\n.btn-gray { background: var(--fill); color: var(--label); }\n.btn-pill { border-radius: var(--r-pill); }\n.btn[disabled]{ opacity:.4; pointer-events:none; }\n\n/* — Inputs — */\n.field { display:block; }\n.field .flabel { font-size: 12px; font-weight: 600; color: var(--label-2); margin-bottom: 6px; }\n.input { width:100%; font-size: var(--f-call); padding: 11px 13px; border-radius: var(--r-md); border: 1px solid var(--separator); background: var(--bg); color: var(--label); transition: border-color var(--ease), box-shadow var(--ease); }\n.input::placeholder { color: var(--label-3); }\n.input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3.5px rgba(0,122,255,.18); }\n.seg { display:inline-flex; background: var(--bg-grouped); border-radius: var(--r-md); padding: 2px; gap: 2px; }\n.seg button { border:none; background: transparent; font-size: 13px; font-weight: 600; color: var(--label); padding: 7px 14px; border-radius: 9px; transition: background var(--ease), box-shadow var(--ease); }\n.seg button[aria-pressed=\"true\"]{ background: var(--bg); box-shadow: var(--sh-1); }\n.switch { width: 51px; height: 31px; border-radius: var(--r-pill); background: var(--separator); position: relative; border:none; padding:0; transition: background var(--spring); }\n.switch::after { content:\"\"; position:absolute; top:2px; left:2px; width:27px; height:27px; border-radius:50%; background:#fff; box-shadow: var(--sh-1); transition: transform var(--spring); }\n.switch[aria-checked=\"true\"]{ background: #34C759; }\n.switch[aria-checked=\"true\"]::after{ transform: translateX(20px); }\n\n/* — blueprint guide motif — */\n.guide-stage { background: var(--guide-bg); border-radius: var(--r-lg); padding: 28px; position: relative; }\n.guide-note { position:absolute; top:12px; left:16px; font-size: 11px; font-weight: 700; letter-spacing: .04em; color: var(--guide); text-transform: uppercase; }\n.dashed { border: 1.5px dashed var(--guide); border-radius: 8px; }\n\n/* radial demo */\n.radial-stage { position: relative; aspect-ratio: 1.5/1; }\n.podium { position:absolute; inset:0; display:flex; flex-direction:column; gap:2px; border-radius: var(--r-md); overflow:hidden; }\n.podium .band { flex:1; display:flex; align-items:center; justify-content:space-between; padding: 0 16px; font-size: 48px; font-weight: 700; color: rgba(0,122,255,.16); }\n.podium .band.b1 { background: rgba(0,122,255,.08); }\n.podium .band.b2 { background: rgba(0,122,255,.15); }\n.podium .band.b3 { background: rgba(0,122,255,.22); }\n.radial-orbit { position:absolute; inset:0; pointer-events:none; }\n.avatar { position:absolute; width: 72px; height: 72px; border-radius:50%; display:grid; place-items:center; color:#fff; font-size: 30px; font-weight: 600; box-shadow: var(--sh-avatar); transition: left var(--spring), top var(--spring); transform: translate(-50%,-50%); }\n\n/* leaderboard grid */\n.leaderboard { display:grid; grid-template-columns: auto 1fr auto; align-items:center; gap: 14px 16px; }\n.lb-type { font-weight: 600; font-size: var(--f-call); }\n.lb-track { height: 8px; border-radius: var(--r-pill); background: var(--cyan); overflow:hidden; }\n.lb-fill { height:100%; border-radius: var(--r-pill); background: var(--blue); transition: width var(--spring); }\n.lb-count { font-variant-numeric: tabular-nums; font-weight: 680; text-align:right; min-width: 28px; color: var(--label); }\n.lb-div { grid-column: 1 / -1; height: 0.5px; background: var(--separator); }\n\n/* vote buttons (equal width stack) */\n.vote-controls { display:flex; flex-direction:column; gap: 14px; }\n.vote-row { display:flex; gap: 10px; }\n.vote-row.vertical { flex-direction: column; }\n.vote-row .btn { flex: 0 0 auto; }\n.vote-row.equal .btn { flex: 1 1 0; min-width: 0; }\n.measure { display:flex; align-items:center; gap:10px; font-size:12px; color:var(--label-2); }\n.measure input[type=range]{ accent-color: var(--blue); flex:1; }\n\n/* motion strip */\n.motion-card { padding: 18px; text-align:center; }\n.motion-card .dot { width: 40px; height: 40px; border-radius: 50%; background: var(--blue); margin: 8px auto 14px; }\n.motion-card h4 { font-size: var(--f-head); }\n.motion-card p { font-size: var(--f-foot); color: var(--label-2); margin-top: 4px; }\n.motion-card code { font-size: 11px; background: var(--bg-grouped); padding: 2px 6px; border-radius: 5px; color: var(--guide); font-weight: 600; }\n\n.pad { padding: 22px; }\n.center { text-align:center; }\n.muted { color: var(--label-2); }\n.fnote { font-size: 12px; color: var(--label-2); }\n\nfooter { padding: 48px 0 64px; text-align:center; color: var(--label-2); font-size: var(--f-foot); border-top: 0.5px solid var(--separator); margin-top: 32px; }\n\n@media (prefers-reduced-motion: reduce){ * { transition: none !important; } }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- ============ TOP BAR ============ -->\n<div class=\"topbar\">\n  <div class=\"wrap row\">\n    <div class=\"brand\">\n      <span class=\"mark\"><svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 17h16M4 17l-1.5-9 5 4 4.5-7 4.5 7 5-4L20 17\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n      Casa del Rey · Style Guide\n    <\u002Fdiv>\n    <nav class=\"topnav\">\n      <a href=\"#color\">Color<\u002Fa>\n      <a href=\"#type\">Tipografía<\u002Fa>\n      <a href=\"#buttons\">Botones<\u002Fa>\n      <a href=\"#inputs\">Inputs<\u002Fa>\n      <a href=\"#layouts\">Layouts<\u002Fa>\n      <a href=\"#motion\">Movimiento<\u002Fa>\n    <\u002Fnav>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ HERO ============ -->\n<header class=\"hero wrap\">\n  <span class=\"kicker\">★ Sistema de diseño · v1.0<\u002Fspan>\n  <h1>Un sistema construido sobre<br><span class=\"accent\">layouts personalizados<\u002Fspan>.<\u002Fh1>\n  <p>Adaptado del sample de Apple <em>“Composing Custom Layouts with SwiftUI”<\u002Fem>. Azul como actor, cian como pista, guías magenta. Cuatro layouts que definen la marca.<\u002Fp>\n  <div class=\"meta\">\n    <span class=\"tag\">SF System Font<\u002Fspan>\n    <span class=\"tag\">systemBlue #007AFF<\u002Fspan>\n    <span class=\"tag\">8-pt grid<\u002Fspan>\n    <span class=\"tag\">Spring por defecto<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<main class=\"wrap\">\n\n  <!-- ============ COLOR ============ -->\n  <section class=\"block\" id=\"color\">\n    <div class=\"sec-head\">\n      <span class=\"sec-num\">01<\u002Fspan>\n      <h2>Paleta de color<\u002Fh2>\n      <span class=\"sub\">El azul actúa, el cian sostiene, el magenta guía la estructura.<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"grid cols-4\" id=\"swatches\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ TYPE ============ -->\n  <section class=\"block\" id=\"type\">\n    <div class=\"sec-head\">\n      <span class=\"sec-num\">02<\u002Fspan>\n      <h2>Tipografía<\u002Fh2>\n      <span class=\"sub\">San Francisco. Escala HIG, numerales grandes (64pt) como en el podio.<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"card\" id=\"typeList\"><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ BUTTONS ============ -->\n  <section class=\"block\" id=\"buttons\">\n    <div class=\"sec-head\">\n      <span class=\"sec-num\">03<\u002Fspan>\n      <h2>Botones<\u002Fh2>\n      <span class=\"sub\">Estilo <code>.bordered<\u002Fcode> del sample como base, más relleno y plano.<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"grid cols-2\">\n      <div class=\"card pad\">\n        <div style=\"display:flex; flex-wrap:wrap; gap:12px; align-items:center;\">\n          <button class=\"btn btn-bordered\">Bordered<\u002Fbutton>\n          <button class=\"btn btn-filled\">Filled<\u002Fbutton>\n          <button class=\"btn btn-gray\">Gray<\u002Fbutton>\n          <button class=\"btn btn-plain\">Plain<\u002Fbutton>\n          <button class=\"btn btn-filled btn-pill\">Pill<\u002Fbutton>\n          <button class=\"btn btn-bordered\" disabled=\"\">Disabled<\u002Fbutton>\n        <\u002Fdiv>\n        <p class=\"fnote\" style=\"margin-top:16px;\">Radio 12px · escala 0.96 al presionar · transición ease 280ms.<\u002Fp>\n      <\u002Fdiv>\n      <!-- Equal width stack demo -->\n      <div class=\"card pad\">\n        <div class=\"measure\" style=\"margin-bottom:14px;\">\n          <span>Ancho contenedor<\u002Fspan>\n          <input type=\"range\" id=\"widthSlider\" min=\"220\" max=\"560\" value=\"520\">\n          <span id=\"widthVal\" style=\"font-variant-numeric:tabular-nums; width:44px;\">520<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"guide-stage\" style=\"padding:34px 18px 18px;\">\n          <span class=\"guide-note\">MyEqualWidthHStack · ViewThatFits<\u002Fspan>\n          <div id=\"eqStage\" style=\"margin:0 auto;\">\n            <div class=\"vote-row equal\" id=\"eqRow\">\n              <button class=\"btn btn-bordered\">Gato<\u002Fbutton>\n              <button class=\"btn btn-bordered\">Pez dorado<\u002Fbutton>\n              <button class=\"btn btn-bordered\">Perro<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <p class=\"fnote\" style=\"margin-top:12px;\">Todos los botones toman el ancho del más ancho. Si no caben, el stack pasa a vertical — <code>ViewThatFits<\u002Fcode>.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ INPUTS ============ -->\n  <section class=\"block\" id=\"inputs\">\n    <div class=\"sec-head\">\n      <span class=\"sec-num\">04<\u002Fspan>\n      <h2>Inputs &amp; controles<\u002Fh2>\n      <span class=\"sub\">Campos, segmented control y switch con foco azul HIG.<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"grid cols-3\">\n      <div class=\"card pad\">\n        <label class=\"field\">\n          <span class=\"flabel\">Nombre<\u002Fspan>\n          <input class=\"input\" placeholder=\"¿Cómo te llamas?\">\n        <\u002Flabel>\n        <label class=\"field\" style=\"margin-top:16px;\">\n          <span class=\"flabel\">Correo<\u002Fspan>\n          <input class=\"input\" type=\"email\" placeholder=\"tu@correo.com\">\n        <\u002Flabel>\n      <\u002Fdiv>\n      <div class=\"card pad\" style=\"display:flex; flex-direction:column; gap:18px; justify-content:center;\">\n        <div>\n          <span class=\"flabel\" style=\"display:block; margin-bottom:8px;\">Segmented<\u002Fspan>\n          <div class=\"seg\" id=\"seg\">\n            <button aria-pressed=\"true\">Semana<\u002Fbutton>\n            <button aria-pressed=\"false\">Mes<\u002Fbutton>\n            <button aria-pressed=\"false\">Año<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:14px;\">\n          <button class=\"switch\" id=\"sw\" aria-checked=\"true\" role=\"switch\" aria-label=\"Notificaciones\"><\u002Fbutton>\n          <span class=\"muted\" style=\"font-size:14px;\">Recordatorios activados<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card pad\">\n        <span class=\"flabel\" style=\"display:block; margin-bottom:8px;\">Mensaje<\u002Fspan>\n        <textarea class=\"input\" rows=\"5\" placeholder=\"Cuéntanos algo de ti…\" style=\"resize:none;\"><\u002Ftextarea>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ LAYOUTS ============ -->\n  <section class=\"block\" id=\"layouts\">\n    <div class=\"sec-head\">\n      <span class=\"sec-num\">05<\u002Fspan>\n      <h2>Los 4 layouts personalizados<\u002Fh2>\n      <span class=\"sub\">El corazón del sistema. Vota para verlos reaccionar en vivo.<\u002Fspan>\n    <\u002Fdiv>\n\n    <div class=\"grid cols-2\">\n      <!-- Radial + Podium -->\n      <div class=\"card pad\">\n        <h3 style=\"font-size:var(--f-t3); margin-bottom:4px;\">Radial Layout + Podio<\u002Fh3>\n        <p class=\"fnote\" style=\"margin-bottom:16px;\">Avatares en círculo (radio = min/3). El líder rota hacia arriba según su rango.<\u002Fp>\n        <div class=\"radial-stage\">\n          <div class=\"podium\">\n            <div class=\"band b1\"><span>1<\u002Fspan><span>1<\u002Fspan><\u002Fdiv>\n            <div class=\"band b2\"><span>2<\u002Fspan><span>2<\u002Fspan><\u002Fdiv>\n            <div class=\"band b3\"><span>3<\u002Fspan><span>3<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"radial-orbit\" id=\"orbit\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Leaderboard -->\n      <div class=\"card pad\" style=\"display:flex; flex-direction:column;\">\n        <h3 style=\"font-size:var(--f-t3); margin-bottom:4px;\">Leaderboard (Grid)<\u002Fh3>\n        <p class=\"fnote\" style=\"margin-bottom:20px;\">3 columnas: etiqueta · barra de progreso · conteo alineado a la derecha.<\u002Fp>\n        <div class=\"leaderboard\" id=\"leaderboard\" style=\"margin-top:auto; margin-bottom:auto;\"><\u002Fdiv>\n        <div class=\"vote-row equal\" id=\"voteRow\" style=\"margin-top:24px;\"><\u002Fdiv>\n        <p class=\"fnote center\" style=\"margin-top:14px;\">Total de votos: <strong id=\"totalVotes\">0<\u002Fstrong><\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ MOTION ============ -->\n  <section class=\"block\" id=\"motion\">\n    <div class=\"sec-head\">\n      <span class=\"sec-num\">06<\u002Fspan>\n      <h2>Movimiento<\u002Fh2>\n      <span class=\"sub\">Una sola regla: el spring por defecto de SwiftUI anima todo.<\u002Fspan>\n    <\u002Fdiv>\n    <div class=\"grid cols-3\">\n      <div class=\"card motion-card\"><div class=\"dot\" id=\"m1\"><\u002Fdiv><h4>Spring<\u002Fh4><p>Transiciones de layout y reordenamientos<\u002Fp><code>--spring<\u002Fcode><\u002Fdiv>\n      <div class=\"card motion-card\"><div class=\"dot\" id=\"m2\" style=\"border-radius:14px;\"><\u002Fdiv><h4>Ease<\u002Fh4><p>Hover, foco, color de fondo<\u002Fp><code>--ease<\u002Fcode><\u002Fdiv>\n      <div class=\"card motion-card\"><div class=\"dot\" id=\"m3\"><\u002Fdiv><h4>Escala 0.96<\u002Fh4><p>Feedback táctil al presionar<\u002Fp><code>:active<\u002Fcode><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n<\u002Fmain>\n\n<footer>\n  Casa del Rey · Sistema de diseño basado en <em>Composing Custom Layouts with SwiftUI<\u002Fem> de Apple.<br>\n  <span style=\"opacity:.6;\">Tokens, componentes y layouts listos para re-skin del sitio.<\u002Fspan>\n<\u002Ffooter>\n\n<script>\n/* ============================================================\n   DATA — the sample's pets\n   ============================================================ */\nconst PETS = [\n  { type: 'Gato',  color: 'var(--c-cat)',  letter: 'G', votes: 0 },\n  { type: 'Pez',   color: 'var(--c-fish)', letter: 'P', votes: 1 },\n  { type: 'Perro', color: 'var(--c-dog)',  letter: 'P', votes: 2 },\n];\n\n/* ---------- Color swatches ---------- */\nconst SWATCHES = [\n  ['systemBlue','#007AFF','--blue'], ['Blue strong','#0A66E0','--blue-strong'],\n  ['Blue tint','#E6F0FF','--blue-tint'], ['Cyan track','#BFE9F0','--cyan'],\n  ['Cyan soft','#DCF3F7','--cyan-soft'], ['Guide magenta','#E6007E','--guide'],\n  ['Guide bg','#FDEBF1','--guide-bg'], ['Label','#1C1C1E','--label'],\n  ['Separator','#E5E5EA','--separator'], ['Grouped bg','#F2F2F7','--bg-grouped'],\n  ['Cat','#FF9F0A','--c-cat'], ['Dog','#AC8E68','--c-dog'],\n];\ndocument.getElementById('swatches').innerHTML = SWATCHES.map(([name,hex,tok]) => `\n  <div class=\"swatch\">\n    <div class=\"chip\" style=\"background:${hex}\"><\u002Fdiv>\n    <div class=\"meta\"><div class=\"name\">${name}<\u002Fdiv><div class=\"hex\">${hex}<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>`).join('');\n\n/* ---------- Type specimens ---------- */\nconst TYPE = [\n  ['Large Title · 34 / Bold', 34, 700, 'Casa del Rey'],\n  ['Title 1 · 28 / Bold', 28, 700, 'Los 4 layouts'],\n  ['Title 2 · 22 / Semibold', 22, 640, 'Radial Layout'],\n  ['Headline · 17 / Semibold', 17, 640, 'Vota por tu favorito'],\n  ['Body · 17 / Regular', 17, 400, 'Avatares dispuestos en círculo.'],\n  ['Footnote · 13 / Regular', 13, 400, 'radio = min(ancho, alto) / 3'],\n  ['Numeral · 64 / Bold', 64, 700, '1  2  3'],\n];\ndocument.getElementById('typeList').innerHTML = TYPE.map(([spec,size,wt,sample]) => `\n  <div class=\"type-row\">\n    <span class=\"spec\">${spec}<\u002Fspan>\n    <span class=\"sample\" style=\"font-size:${size}px; font-weight:${wt}; ${size===64?'font-variant-numeric:tabular-nums; letter-spacing:.06em;':''}\">${sample}<\u002Fspan>\n  <\u002Fdiv>`).join('');\n\n/* ============================================================\n   RADIAL LAYOUT — faithful port of MyRadialLayout\n   ============================================================ */\nconst orbit = document.getElementById('orbit');\nfunction rank(pet){ return PETS.reduce((acc,p)=> acc + (p.votes > pet.votes ? 1 : 0), 1); }\n\nfunction residual(r1,r2){\n  if (r1===1) return -0.5;\n  if (r2===1) return 0.5;\n  if (r1<r2) return -0.25;\n  if (r1>r2) return 0.25;\n  return 0;\n}\nfunction getOffset(ranks){\n  if (ranks.length!==3 || ranks.every(r=>r===ranks[0])) return 0;\n  let fraction;\n  if (ranks[0]===1) fraction = residual(ranks[1],ranks[2]);\n  else if (ranks[1]===1) fraction = -1 + residual(ranks[2],ranks[0]);\n  else fraction = 1 + residual(ranks[0],ranks[1]);\n  return fraction * 2*Math.PI/3;\n}\n\n// build avatar nodes once\nPETS.forEach((pet,i)=>{\n  const a = document.createElement('div');\n  a.className = 'avatar';\n  a.style.background = pet.color;\n  a.textContent = pet.letter;\n  a.dataset.i = i;\n  orbit.appendChild(a);\n});\nconst avatarEls = [...orbit.querySelectorAll('.avatar')];\n\nfunction placeRadial(){\n  const b = orbit.getBoundingClientRect();\n  const radius = Math.min(b.width, b.height) / 3;\n  const angle = 2*Math.PI / PETS.length;\n  const ranks = PETS.map(p=>rank(p));\n  const offset = getOffset(ranks);\n  avatarEls.forEach((el,index)=>{\n    const theta = angle*index + offset;\n    // CGPoint(0,-radius) rotated by theta  →  (sin·r, -cos·r)\n    const px = Math.sin(theta)*radius;\n    const py = -Math.cos(theta)*radius;\n    el.style.left = (b.width/2 + px) + 'px';\n    el.style.top  = (b.height/2 + py) + 'px';\n  });\n}\n\n/* ============================================================\n   LEADERBOARD + VOTE BUTTONS\n   ============================================================ */\nconst lb = document.getElementById('leaderboard');\nconst voteRow = document.getElementById('voteRow');\n\nfunction renderLeaderboard(){\n  const total = Math.max(1, PETS.reduce((a,p)=>a+p.votes,0));\n  lb.innerHTML = PETS.map(p=>`\n    <span class=\"lb-type\">${p.type}<\u002Fspan>\n    <div class=\"lb-track\"><div class=\"lb-fill\" style=\"width:${(p.votes/total)*100}%\"><\u002Fdiv><\u002Fdiv>\n    <span class=\"lb-count\">${p.votes}<\u002Fspan>\n    <div class=\"lb-div\"><\u002Fdiv>\n  `).join('');\n  document.getElementById('totalVotes').textContent = PETS.reduce((a,p)=>a+p.votes,0);\n}\n\nvoteRow.innerHTML = PETS.map((p,i)=>`<button class=\"btn btn-bordered\" data-vote=\"${i}\">${p.type}<\u002Fbutton>`).join('');\nvoteRow.addEventListener('click', e=>{\n  const b = e.target.closest('[data-vote]'); if(!b) return;\n  PETS[+b.dataset.vote].votes++;\n  renderLeaderboard();\n  placeRadial();\n});\n\n/* ============================================================\n   EQUAL WIDTH STACK — ViewThatFits demo\n   ============================================================ */\nconst slider = document.getElementById('widthSlider');\nconst widthVal = document.getElementById('widthVal');\nconst eqStage = document.getElementById('eqStage');\nconst eqRow = document.getElementById('eqRow');\nfunction applyWidth(){\n  const w = +slider.value;\n  widthVal.textContent = w;\n  eqStage.style.width = w + 'px';\n  // ViewThatFits: estimate if 3 equal buttons fit horizontally (min ~110px each + gaps)\n  const fits = w >= 3*110 + 2*10;\n  eqRow.classList.toggle('vertical', !fits);\n}\nslider.addEventListener('input', applyWidth);\n\n/* ---------- Segmented + switch ---------- */\ndocument.getElementById('seg').addEventListener('click', e=>{\n  const b = e.target.closest('button'); if(!b) return;\n  [...e.currentTarget.children].forEach(x=>x.setAttribute('aria-pressed', x===b));\n});\nconst sw = document.getElementById('sw');\nsw.addEventListener('click', ()=> sw.setAttribute('aria-checked', sw.getAttribute('aria-checked')!=='true'));\n\n/* ---------- Motion demo loop ---------- */\nlet mt = 0;\nsetInterval(()=>{\n  mt = mt? 0 : 1;\n  const d1 = document.getElementById('m1'), d2 = document.getElementById('m2'), d3 = document.getElementById('m3');\n  d1.style.transition = 'transform var(--spring)';\n  d2.style.transition = 'transform var(--ease)';\n  d3.style.transition = 'transform 120ms ease';\n  d1.style.transform = mt? 'translateX(36px)' : 'translateX(-36px)';\n  d2.style.transform = mt? 'translateX(36px)' : 'translateX(-36px)';\n  d3.style.transform = mt? 'scale(.78)' : 'scale(1)';\n}, 1400);\n\n/* ---------- Init ---------- */\nfunction init(){ renderLeaderboard(); placeRadial(); applyWidth(); }\nwindow.addEventListener('resize', placeRadial);\nwindow.addEventListener('load', init);\ninit();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
