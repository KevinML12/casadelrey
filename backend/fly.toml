app = "casa-del-rey-mvp"
primary_region = "dfw"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  # 1 máquina siempre despierta: evita que el primer visitante después de
  # inactividad pague ~60s de AutoMigrate + reconexión a Postgres. Sigue
  # dentro del tier gratuito de Fly (shared-cpu-1x:256MB, hasta 3 gratis).
  min_machines_running = 1
  processes = ["app"]
